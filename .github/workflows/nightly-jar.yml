name: Nightly JAR

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  build-nightly-jar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build standalone JAR
        run: mvn -B -DskipTests package

      - name: Prepare nightly asset
        run: cp -- "$(bash scripts/find-release-jar.sh target)" target/opendoja-nightly.jar

      - name: Move nightly tag
        shell: bash
        run: |
          git tag -f nightly
          git push origin refs/tags/nightly --force

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: openDoJa nightly
          body: Rolling nightly build from `${{ github.sha }}`.
          prerelease: true
          make_latest: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: target/opendoja-nightly.jar
