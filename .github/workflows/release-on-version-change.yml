name: Release On Version Change

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  detect-version-change:
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.version.outputs.current_version }}
      previous_version: ${{ steps.version.outputs.previous_version }}
      version_changed: ${{ steps.version.outputs.version_changed }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        shell: bash
        run: |
          current_version=$(python3 scripts/project-version.py pom.xml)

          previous_version=""
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            previous_pom=$(mktemp)
            git show HEAD^:pom.xml > "$previous_pom"
            previous_version=$(python3 scripts/project-version.py "$previous_pom")
            rm -f "$previous_pom"
          fi

          version_changed=false
          if [[ -n "$previous_version" && "$current_version" != "$previous_version" ]]; then
            version_changed=true
          fi

          printf 'current_version=%s\n' "$current_version" >> "$GITHUB_OUTPUT"
          printf 'previous_version=%s\n' "$previous_version" >> "$GITHUB_OUTPUT"
          printf 'version_changed=%s\n' "$version_changed" >> "$GITHUB_OUTPUT"

  build-and-release:
    needs: detect-version-change
    if: needs.detect-version-change.outputs.version_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build release JAR
        run: mvn -B -DskipTests package

      - name: Prepare release asset
        run: cp -- "$(bash scripts/find-release-jar.sh target)" target/opendoja-release.jar

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect-version-change.outputs.current_version }}
          name: openDoJa v${{ needs.detect-version-change.outputs.current_version }}
          generate_release_notes: true
          files: target/opendoja-release.jar
